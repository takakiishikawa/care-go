name: Cron — Notify

# 夜のチェックインを促すPush通知。 GH Actions cron が本番URLの /api/cron/notify を叩く。
# 旧: vercel.json の crons (Hobby plan の Vercel Cron 制限を避けるため GH Actions に移行)
#
# 必要な GitHub Secrets:
#   PROD_URL    例: https://carego.vercel.app
#   CRON_SECRET route.ts で検証する Bearer トークン

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # JST 10:00 daily

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notify endpoint
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PROD_URL }}/api/cron/notify"
